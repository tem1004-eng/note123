<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piltong Note - Pro</title>
    <style>
        :root {
            --bg-color: #f4f4f7;
            --sidebar-color: #ffffff;
            --accent-color: #4a90e2;
            --border-color: #d1d1d1;
            --text-main: #333;
            --note-bg: #ffffff; 
            --note-text: #000000;
            --note-line: #e8e8e8;
        }

        body {
            margin: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-size: 1.5rem; font-weight: bold; }
        .header-btns button {
            background-color: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 15px;
            margin-left: 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        .toolbar {
            background-color: var(--sidebar-color);
            border-bottom: 1px solid var(--border-color);
            padding: 10px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .meta-info { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .meta-info input, .meta-info select { padding: 6px; border: 1px solid var(--border-color); border-radius: 4px; }
        .title-input { flex-grow: 1; font-weight: bold; min-width: 150px; }

        .mode-tools { display: flex; gap: 10px; align-items: center; border-top: 1px solid #eee; padding-top: 10px; flex-wrap: wrap; }
        .btn-group { display: flex; border: 1px solid var(--border-color); border-radius: 4px; overflow: hidden; }
        .btn-group button { background: white; border: none; padding: 8px 12px; cursor: pointer; border-right: 1px solid #ddd; }
        .btn-group button.active { background: var(--accent-color); color: white; }
        
        .dynamic-controls button {
            background: white; border: 1px solid var(--border-color); padding: 6px 10px; border-radius: 4px; cursor: pointer; margin-right: 2px;
        }
        
        #draw-tools button.active-tool { background: #d0e4fb; border-color: var(--accent-color); font-weight: bold; }

        main { 
            flex-grow: 1; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background: #e5e5e5; 
            overflow: hidden; 
        }
        
        .page-container {
            width: 100%; 
            max-width: 1000px; 
            height: 100%; 
            background-color: var(--note-bg);
            padding: 40px; 
            box-sizing: border-box;
            position: relative; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
        }

        .editor-wrapper {
            position: relative;
            width: 100%;
            flex-grow: 1;
            overflow-y: auto; 
            display: block;
        }

        #text-editor {
            width: 100%; 
            min-height: 100%; 
            height: max-content; 
            border: none; 
            outline: none;
            font-size: 16px; 
            line-height: 32px; 
            color: var(--note-text);
            background: repeating-linear-gradient(transparent, transparent 31px, var(--note-line) 31px, var(--note-line) 32px);
            background-attachment: local; 
            background-color: transparent;
            overflow: visible; 
            white-space: pre-wrap; 
            word-wrap: break-word;
        }

        #text-editor img { border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); cursor: pointer; max-width: 100%; height: auto; }
        
        .img-inline { display: inline-block; margin: 5px; vertical-align: top; }
        .img-float-left { float: left; margin: 10px 20px 10px 0; }
        .img-float-right { float: right; margin: 10px 0 10px 20px; }
        .img-center { display: block; margin: 20px auto; clear: both; }

        #canvas-editor { 
            position: absolute; 
            top: 0; 
            left: 0; 
            z-index: 5; 
            display: block; 
            pointer-events: none; 
        }

        #resize-overlay { position: absolute; outline: 2px solid var(--accent-color); z-index: 10; pointer-events: none; display: none; }
        .resize-handle { width: 12px; height: 12px; background: white; border: 2px solid var(--accent-color); position: absolute; border-radius: 50%; pointer-events: auto; }
        .resize-handle.nw { top: -7px; left: -7px; cursor: nw-resize; }
        .resize-handle.ne { top: -7px; right: -7px; cursor: ne-resize; }
        .resize-handle.sw { bottom: -7px; left: -7px; cursor: sw-resize; }
        .resize-handle.se { bottom: -7px; right: -7px; cursor: se-resize; }

        .signature {
            position: fixed;
            bottom: 15px;
            right: 25px;
            text-align: right;
            font-size: 12px;
            color: #888;
            line-height: 1.5;
            z-index: 1000;
            pointer-events: none;
        }

        #save-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 2000;
        }
        .modal-content { background: white; padding: 20px; border-radius: 8px; width: 350px; max-width: 90%; }
        .hidden { display: none !important; }

        @media (max-width: 768px) {
            main { padding: 10px; }
            .page-container { padding: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Piltong Note</div>
        <div class="header-btns">
            <input type="file" id="file-loader" class="hidden" accept=".json" onchange="loadFromJson(this)">
            <input type="file" id="image-loader" class="hidden" accept="image/*" onchange="insertImage(this)">
            <button onclick="startNewNote()">새글</button>
            <button onclick="document.getElementById('file-loader').click()">불러오기</button>
            <button onclick="openSaveModal()">저장하기</button>
        </div>
    </header>

    <div class="toolbar">
        <div class="meta-info">
            <input type="date" id="doc-date">
            <input type="text" id="doc-location" placeholder="장소">
            <input type="text" id="doc-title" class="title-input" placeholder="제목을 입력하세요">
            <select id="folder-select"><option>기본 폴더</option></select>
            <button onclick="addNewFolder()">+ 새 폴더</button>
        </div>
        <div class="mode-tools">
            <div class="btn-group">
                <button id="btn-kb" class="active" onclick="setMode('keyboard')">⌨️ 키보드</button>
                <button id="btn-draw" onclick="setMode('draw')">🎨 그리기</button>
            </div>
            <div id="text-tools" class="dynamic-controls">
                <button onclick="execCmd('bold')"><b>B</b></button>
                <button onclick="execCmd('italic')"><i>I</i></button>
                <button onclick="execCmd('underline')"><u>U</u></button>
                <span style="color: #ccc; margin: 0 10px;">|</span>
                <button onclick="document.getElementById('image-loader').click()">🖼️ 사진 추가</button>
            </div>
            <div id="image-tools" class="dynamic-controls hidden">
                <span style="font-size: 14px;">배치:</span>
                <button onclick="changeImageAlignment('inline')" title="나란히">🔲</button>
                <button onclick="changeImageAlignment('left')">👈</button>
                <button onclick="changeImageAlignment('center')">⬛</button>
                <button onclick="changeImageAlignment('right')">👉</button>
                <button onclick="removeSelectedImage()" style="color: #e74c3c; margin-left:10px;">🗑️ 삭제</button>
            </div>
            <div id="draw-tools" class="hidden dynamic-controls">
                <button id="tool-pen" class="active-tool" onclick="setDrawTool('pen')">🖌️ 펜</button>
                <button id="tool-eraser" onclick="setDrawTool('eraser')">🧹 지우개</button>
                <input type="color" id="pen-color" value="#000000" title="펜 색상">
                <span style="font-size: 14px; margin-left: 5px;">굵기:</span>
                <input type="range" id="pen-size" min="1" max="50" value="3">
                <button onclick="clearCanvas()" style="margin-left: 10px; color: #e74c3c;">전체 지우기</button>
            </div>
        </div>
    </div>

    <main>
        <div class="page-container" id="printable-page">
            <div class="editor-wrapper" id="editor-wrapper">
                <div id="text-editor" contenteditable="true" spellcheck="false"></div>
                <canvas id="canvas-editor"></canvas>
                <div id="resize-overlay">
                    <div class="resize-handle nw" data-handle="nw"></div>
                    <div class="resize-handle ne" data-handle="ne"></div>
                    <div class="resize-handle sw" data-handle="sw"></div>
                    <div class="resize-handle se" data-handle="se"></div>
                </div>
            </div>
        </div>
    </main>

    <div class="signature">
        made by piltong pastor<br>
        (tempusan@hanmail.net)
    </div>

    <div id="save-modal">
        <div class="modal-content">
            <h3>저장 설정</h3>
            <button onclick="saveFile('json')" style="width:100%; padding:10px; margin-bottom:5px;">JSON으로 저장 (내용/그림/사진 모두 포함)</button>
            <button onclick="saveFile('txt')" style="width:100%; padding:10px; margin-bottom:5px;">TXT로 저장 (글자만)</button>
            <hr>
            <button onclick="closeSaveModal()" style="width:100%; padding:5px;">취소</button>
        </div>
    </div>

    <script>
        let folders = ["기본 폴더"];
        let selectedImage = null;
        let isResizing = false;
        let resizeData = { startX: 0, startWidth: 0, startHeight: 0, aspectRatio: 0, currentHandle: null };
        let currentDrawTool = 'pen'; 
        let lastImageWidth = 300; 

        const canvas = document.getElementById('canvas-editor');
        const ctx = canvas.getContext('2d');
        const textEditor = document.getElementById('text-editor');
        const editorWrapper = document.getElementById('editor-wrapper');
        const folderSelect = document.getElementById('folder-select');
        const resizeOverlay = document.getElementById('resize-overlay');

        window.onload = () => {
            document.getElementById('doc-date').valueAsDate = new Date();
            updateFolderDropdown();
        };

        const resizeObserver = new ResizeObserver(() => {
            if(textEditor.offsetWidth === 0) return; 
            if(canvas.width !== textEditor.offsetWidth || canvas.height !== textEditor.scrollHeight) {
                const oldData = canvas.toDataURL();
                canvas.width = textEditor.offsetWidth;
                canvas.height = Math.max(editorWrapper.clientHeight, textEditor.scrollHeight);
                const img = new Image();
                img.onload = () => ctx.drawImage(img, 0, 0);
                img.src = oldData;
            }
        });
        resizeObserver.observe(textEditor);

        function loadCanvasData(dataUrl) {
            if (!dataUrl || dataUrl === "data:,") {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                return;
            }
            const img = new Image(); 
            img.onload = () => { 
                ctx.clearRect(0,0,canvas.width, canvas.height); 
                ctx.drawImage(img, 0, 0); 
            };
            img.src = dataUrl; 
        }

        // 👇 새글 기능 로직
        function startNewNote() {
            if (confirm("현재 작성 중인 내용이 모두 지워집니다.\n정말 새 글을 작성하시겠습니까?")) {
                document.getElementById('doc-title').value = "";
                document.getElementById('doc-date').valueAsDate = new Date();
                document.getElementById('doc-location').value = "";
                textEditor.innerHTML = "";
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                deselectImage();
                setMode('keyboard');
                lastImageWidth = 300; // 사진 기본 크기 초기화
            }
        }

        textEditor.addEventListener('paste', e => {
            const items = (e.clipboardData || window.clipboardData).items;
            let hasImage = false;

            for (let item of items) {
                if (item.type.indexOf('image') !== -1) {
                    hasImage = true;
                    const file = item.getAsFile();
                    const reader = new FileReader();
                    reader.onload = ev => {
                        textEditor.focus();
                        document.execCommand('insertHTML', false, `<img src="${ev.target.result}" class="img-inline" style="width: ${lastImageWidth}px; max-width: 100%;" alt="사진"> `);
                    };
                    reader.readAsDataURL(file);
                }
            }

            if (hasImage) {
                e.preventDefault(); 
                return;
            }

            let text = (e.clipboardData || window.clipboardData).getData('text');
            if (!text) return; 
            e.preventDefault();
            text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').replace(/\n{3,}/g, '\n\n');
            document.execCommand('insertText', false, text);
        });

        function execCmd(cmd) { document.execCommand(cmd, false, null); textEditor.focus(); }

        textEditor.addEventListener('keydown', e => {
            if (e.ctrlKey) {
                switch(e.key.toLowerCase()) {
                    case 'b': e.preventDefault(); execCmd('bold'); break;
                    case 'i': e.preventDefault(); execCmd('italic'); break;
                    case 'u': e.preventDefault(); execCmd('underline'); break;
                }
            }
        });

        function insertImage(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                textEditor.focus();
                document.execCommand('insertHTML', false, `<img src="${e.target.result}" class="img-inline" style="width: ${lastImageWidth}px; max-width: 100%;" alt="사진"> `);
                input.value = ""; 
            }
            reader.readAsDataURL(file);
        }

        function removeSelectedImage() { 
            if(selectedImage && confirm("삭제하시겠습니까?")) { 
                selectedImage.remove(); 
                deselectImage(); 
            } 
        }

        function updateOverlayPosition() {
            if (!selectedImage) return;
            const wrapperRect = editorWrapper.getBoundingClientRect();
            const imgRect = selectedImage.getBoundingClientRect();
            resizeOverlay.style.top = (imgRect.top - wrapperRect.top + editorWrapper.scrollTop) + 'px';
            resizeOverlay.style.left = (imgRect.left - wrapperRect.left + editorWrapper.scrollLeft) + 'px';
            resizeOverlay.style.width = imgRect.width + 'px';
            resizeOverlay.style.height = imgRect.height + 'px';
            resizeOverlay.style.display = 'block';
        }

        editorWrapper.addEventListener('scroll', updateOverlayPosition);
        window.addEventListener('resize', updateOverlayPosition);
        
        textEditor.addEventListener('click', e => {
            if (e.target.tagName === 'IMG') selectImage(e.target);
            else if (!isResizing) deselectImage();
        });

        function selectImage(imgTag) {
            selectedImage = imgTag;
            document.getElementById('text-tools').classList.add('hidden');
            document.getElementById('image-tools').classList.remove('hidden');
            updateOverlayPosition();
        }

        function deselectImage() {
            selectedImage = null;
            resizeOverlay.style.display = 'none';
            document.getElementById('image-tools').classList.add('hidden');
            if (document.getElementById('btn-kb').classList.contains('active')) {
                document.getElementById('text-tools').classList.remove('hidden');
            }
        }

        function changeImageAlignment(align) {
            if (selectedImage) {
                selectedImage.classList.remove('img-float-left', 'img-float-right', 'img-center', 'img-inline');
                if (align === 'left') selectedImage.classList.add('img-float-left');
                else if (align === 'right') selectedImage.classList.add('img-float-right');
                else if (align === 'center') selectedImage.classList.add('img-center');
                else selectedImage.classList.add('img-inline');
                setTimeout(updateOverlayPosition, 10); 
            }
        }

        document.querySelectorAll('.resize-handle').forEach(handle => {
            handle.addEventListener('mousedown', startResizing);
            handle.addEventListener('touchstart', startResizing, {passive: false});
        });

        function startResizing(e) {
            if (!selectedImage) return;
            e.preventDefault(); e.stopPropagation();
            isResizing = true;
            resizeData.currentHandle = e.target.getAttribute('data-handle');
            const touch = e.type === 'touchstart' ? e.touches[0] : e;
            resizeData.startX = touch.clientX;
            resizeData.startWidth = selectedImage.offsetWidth;
            resizeData.startHeight = selectedImage.offsetHeight;
            resizeData.aspectRatio = resizeData.startWidth / resizeData.startHeight;
            
            document.addEventListener('mousemove', handleResizing);
            document.addEventListener('mouseup', stopResizing);
            document.addEventListener('touchmove', handleResizing, {passive: false});
            document.addEventListener('touchend', stopResizing);
        }

        function handleResizing(e) {
            if (!isResizing || !selectedImage) return;
            const touch = e.type === 'touchmove' ? e.touches[0] : e;
            const dx = touch.clientX - resizeData.startX;
            let mult = (resizeData.currentHandle === 'nw' || resizeData.currentHandle === 'sw') ? -1 : 1;
            let nw = Math.max(50, resizeData.startWidth + (dx * mult));
            
            const maxWidth = textEditor.offsetWidth - 20;
            nw = Math.min(nw, maxWidth);
            
            selectedImage.style.width = nw + 'px';
            selectedImage.style.height = (nw / resizeData.aspectRatio) + 'px';
            
            lastImageWidth = nw; 
            
            updateOverlayPosition();
        }

        function stopResizing() {
            isResizing = false;
            document.removeEventListener('mousemove', handleResizing);
            document.removeEventListener('mouseup', stopResizing);
            document.removeEventListener('touchmove', handleResizing);
            document.removeEventListener('touchend', stopResizing);
        }

        function setMode(mode) {
            document.querySelectorAll('.btn-group button').forEach(b => b.classList.remove('active'));
            deselectImage();
            
            const isKb = mode === 'keyboard';
            document.getElementById('btn-kb').classList.toggle('active', isKb);
            document.getElementById('btn-draw').classList.toggle('active', !isKb);
            
            if(isKb) {
                textEditor.setAttribute('contenteditable', 'true');
                canvas.style.pointerEvents = 'none'; 
                document.getElementById('text-tools').classList.remove('hidden');
                document.getElementById('draw-tools').classList.add('hidden');
            } else {
                textEditor.setAttribute('contenteditable', 'false'); 
                canvas.style.pointerEvents = 'auto'; 
                document.getElementById('text-tools').classList.add('hidden');
                document.getElementById('draw-tools').classList.remove('hidden');
                setDrawTool('pen'); 
            }
        }

        function setDrawTool(tool) {
            currentDrawTool = tool;
            document.getElementById('tool-pen').classList.toggle('active-tool', tool === 'pen');
            document.getElementById('tool-eraser').classList.toggle('active-tool', tool === 'eraser');
        }

        function saveFile(format) {
            deselectImage();
            const dv = document.getElementById('doc-date').value;
            const fv = folderSelect.value;
            const tv = document.getElementById('doc-title').value || "제목없음";
            
            let blob, fn = "";
            if (format === 'json') { 
                const data = { 
                    title: tv, date: dv, location: document.getElementById('doc-location').value, folder: fv, 
                    htmlContent: textEditor.innerHTML, canvasData: canvas.toDataURL(), 
                    mode: document.getElementById('btn-kb').classList.contains('active') ? 'keyboard' : 'draw' 
                };
                blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"}); 
                fn = `ptn+${dv}+${fv}+${tv}.json`; 
            } else { 
                blob = new Blob([textEditor.innerText], {type: "text/plain"}); 
                fn = `${tv}.txt`; 
            }
            const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = fn; link.click();
            closeSaveModal();
            if (format === 'json') window.open('https://www.band.us/band/86497404/post', '_blank');
        }

        function loadFromJson(input) {
            const file = input.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                const d = JSON.parse(e.target.result);
                if (d.folder && !folders.includes(d.folder)) { folders.push(d.folder); updateFolderDropdown(); }
                document.getElementById('doc-title').value = d.title;
                document.getElementById('doc-date').value = d.date;
                document.getElementById('doc-location').value = d.location;
                folderSelect.value = d.folder;
                
                textEditor.innerHTML = d.htmlContent || "";
                
                setTimeout(() => {
                    canvas.height = Math.max(editorWrapper.clientHeight, textEditor.scrollHeight);
                    loadCanvasData(d.canvasData || "");
                }, 100);

                setMode(d.mode || 'keyboard');
            };
            reader.readAsText(file); input.value = "";
        }

        function updateFolderDropdown() { 
            folderSelect.innerHTML = ""; 
            folders.forEach(f => { 
                const opt = document.createElement('option'); 
                opt.value = f; opt.innerText = f; 
                folderSelect.appendChild(opt); 
            }); 
        }
        function addNewFolder() { 
            const n = prompt("새 폴더 이름:"); 
            if (n && n.trim()) { 
                if (!folders.includes(n.trim())) { folders.push(n.trim()); updateFolderDropdown(); } 
                folderSelect.value = n.trim(); 
            } 
        }
        
        function openSaveModal() { document.getElementById('save-modal').style.display = 'flex'; }
        function closeSaveModal() { document.getElementById('save-modal').style.display = 'none'; }

        let drawing = false;
        
        function getPointerPos(e) {
            const r = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - r.left, y: clientY - r.top };
        }

        function startDrawing(e) {
            if(!document.getElementById('btn-draw').classList.contains('active')) return;
            drawing = true;
            ctx.beginPath();
            const pos = getPointerPos(e);
            ctx.moveTo(pos.x, pos.y);
            if(e.type === 'touchstart') e.preventDefault(); 
        }

        function draw(e) {
            if (!drawing) return;
            if(e.type === 'touchmove') e.preventDefault(); 
            const pos = getPointerPos(e);
            
            ctx.lineWidth = document.getElementById('pen-size').value; 
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round'; 
            
            if (currentDrawTool === 'eraser') {
                ctx.globalCompositeOperation = 'destination-out';
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = document.getElementById('pen-color').value; 
            }
            
            ctx.lineTo(pos.x, pos.y); 
            ctx.stroke();
        }

        function stopDrawing() {
            if(!drawing) return;
            drawing = false;
            ctx.closePath();
        }

        function clearCanvas() { 
            if(confirm("그린 그림을 모두 지우시겠습니까? (글자는 지워지지 않습니다)")) {
                ctx.clearRect(0,0,canvas.width, canvas.height); 
            }
        }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing); 

        canvas.addEventListener('touchstart', startDrawing, {passive: false});
        canvas.addEventListener('touchmove', draw, {passive: false});
        canvas.addEventListener('touchend', stopDrawing);
        canvas.addEventListener('touchcancel', stopDrawing);

    </script>
</body>
</html>
